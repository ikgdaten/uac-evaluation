name: Supabase Keep-Alive

# Schreibt alle 2 Tage einen Datensatz in die Tabelle "keepalive_log".
# Echte Schreib-Aktivität wird von Supabase eindeutig als "aktiv"
# gewertet — reine Lese-Pings reichen seit 2026 nicht mehr immer.
on:
  schedule:
    - cron: '0 8 */2 * *'   # Alle 2 Tage um 08:00 UTC
  workflow_dispatch:          # Manuell auslösbar zum Testen

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Schreibe Keep-Alive-Eintrag
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Schreibe Keep-Alive-Eintrag in keepalive_log..."

          RESPONSE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/rest/v1/keepalive_log" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"source": "github-action"}')

          if [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 200 ]; then
            echo "✓ Keep-Alive geschrieben (HTTP $RESPONSE)"
          else
            echo "✗ Unerwartete Antwort: HTTP $RESPONSE"
            echo "Server-Antwort:"
            cat /tmp/response.txt
            exit 1
          fi

      - name: Zusätzlicher Lese-Ping als Backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/responses?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")

          if [ "$RESPONSE" -eq 200 ]; then
            echo "✓ Lese-Ping responses-Tabelle (HTTP $RESPONSE)"
          else
            echo "✗ Lese-Ping fehlgeschlagen: HTTP $RESPONSE"
            exit 1
          fi
